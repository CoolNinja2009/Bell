<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Controller</title>
<style>
  :root {
    --bg:       #080c12;
    --panel:    #11171f;
    --border:   #1c2736;
    --text:     #d4dce8;
    --dim:      #5e7088;
    --accent:   #00d4a0;
    --accent2:  #f0a040;
    --danger:   #e0556a;
    --on:       #00e676;
    --off:      #3a4555;
    --radius:   12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 0%, #111d2e 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
    padding: 28px 32px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 14px;
  }
  h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1::before {
    content: "";
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 3px;
    box-shadow: 0 0 10px var(--accent);
  }
  .status-bar {
    display: flex;
    gap: 22px;
    font-size: 0.8rem;
    color: var(--dim);
    font-weight: 500;
  }
  .status-bar > span {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.on  { background: var(--on);  box-shadow: 0 0 8px var(--on); }
  .dot.off { background: var(--off); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(390px, 1fr));
    gap: 22px;
  }
  .channel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    transition: border-color 0.2s;
  }
  .channel:hover { border-color: #263348; }
  .ch-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .ch-header h2 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
  }
  .toggle {
    position: relative;
    width: 46px; height: 26px;
    border-radius: 13px;
    background: var(--off);
    cursor: pointer;
    transition: background 0.25s, box-shadow 0.25s;
    border: none;
    outline: none;
  }
  .toggle:hover { box-shadow: 0 0 8px rgba(0,212,160,0.3); }
  .toggle.active { background: var(--accent); box-shadow: 0 0 12px rgba(0,212,160,0.4); }
  .toggle::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toggle.active::after { transform: translateX(20px); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.72rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .field input[type="number"],
  .field input[type="date"],
  .field input[type="time"] {
    width: 100%;
    background: #0a0f16;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,160,0.12);
  }
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 8px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #151d28;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.8rem;
    font-weight: 500;
    transition: border-color 0.15s;
  }
  .tag:hover { border-color: #2e3d54; }
  .tag button {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0 1px;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .tag button:hover { opacity: 1; }
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .add-row input {
    flex: 1;
    background: #0a0f16;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.84rem;
    font-family: inherit;
  }
  .add-row input:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-save {
    background: linear-gradient(135deg, var(--accent), #00b38a);
    color: #000;
    box-shadow: 0 2px 12px rgba(0,212,160,0.25);
  }
  .btn-save:hover { box-shadow: 0 4px 18px rgba(0,212,160,0.4); }
  .btn-add { background: #15262e; color: var(--accent); border: 1px solid #1e3a3a; }
  .btn-add:hover { background: #1a3038; }
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #000;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.84rem;
    opacity: 0;
    transform: translateY(24px);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.show  { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }

  /* ── Log panel ───────────────────────────── */
  .log-panel {
    margin-top: 22px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 22px;
    background: #0a0f16;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    user-select: none;
  }
  .log-header:hover { background: #0d131c; }
  .log-header .arrow { transition: transform 0.25s; font-size: 0.7rem; }
  .log-panel.collapsed .log-header .arrow { transform: rotate(-90deg); }
  .log-panel.collapsed .log-body { display: none; }
  .log-body {
    max-height: 220px;
    overflow-y: auto;
    padding: 10px 22px 14px;
    font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", "Consolas", monospace;
    font-size: 0.76rem;
    line-height: 1.7;
  }
  .log-line { animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
  .log-time { color: var(--dim); margin-right: 10px; font-weight: 500; }
  .log-msg  { color: var(--text); }
  .log-body::-webkit-scrollbar { width: 5px; }
  .log-body::-webkit-scrollbar-track { background: transparent; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Relay Controller</h1>
  <div class="status-bar">
    <span><span class="dot" id="srv-dot"></span> Server <span id="srv-uptime">—</span></span>
    <span id="hb-ch1"><span class="dot off"></span> CH1 waiting</span>
    <span id="hb-ch2"><span class="dot off"></span> CH2 waiting</span>
    <span><a href="/logout" style="color: var(--dim); text-decoration: none;">Log out</a></span>
  </div>
</header>

<div class="grid" id="channels"></div>

<div class="log-panel" id="log-panel">
  <div class="log-header" onclick="document.getElementById('log-panel').classList.toggle('collapsed')">
    <span>Event Log <span id="log-count" style="color:var(--dim)">(0)</span></span>
    <span class="arrow">&#9660;</span>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Helpers ────────────────────────────────────────────────────────
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];

let schedule = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) {
    window.location.href = '/login';
    throw new Error('Session expired');
  }
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function toast(msg, isErr) {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' error' : '') + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Render ─────────────────────────────────────────────────────────
function renderAll(data) {
  schedule = data;
  $('#channels').innerHTML = '';
  for (const [key, ch] of Object.entries(data)) {
    renderChannel(key, ch);
  }
}

function renderChannel(key, ch) {
  const div = document.createElement('div');
  div.className = 'channel';
  div.dataset.key = key;
  div.innerHTML = `
    <div class="ch-header">
      <h2>${key.toUpperCase()}</h2>
      <button class="toggle${ch.enabled ? ' active' : ''}" data-action="toggle"></button>
    </div>
    <div class="field">
      <label>Pulse Duration (ms)</label>
      <input type="number" value="${ch.pulse_ms}" min="100" step="100" data-field="pulse_ms">
    </div>
    <div class="field">
      <label>Schedule (HH:MM)</label>
      <div class="tag-list" data-list="schedule">
        ${(ch.schedule||[]).map(t => `<span class="tag">${t}<button data-remove="schedule" data-val="${t}">&times;</button></span>`).join('')}
      </div>
      <div class="add-row">
        <input type="time" data-input="schedule" placeholder="HH:MM">
        <button class="btn btn-add" data-add="schedule">+ Add</button>
      </div>
    </div>
    <div class="field">
      <label>Skip Dates (YYYY-MM-DD)</label>
      <div class="tag-list" data-list="skip_dates">
        ${(ch.skip_dates||[]).map(d => `<span class="tag">${d}<button data-remove="skip_dates" data-val="${d}">&times;</button></span>`).join('')}
      </div>
      <div class="add-row">
        <input type="date" data-input="skip_dates">
        <button class="btn btn-add" data-add="skip_dates">+ Add</button>
      </div>
    </div>
    <button class="btn btn-save" data-action="save" style="width:100%;margin-top:8px;">Save ${key.toUpperCase()}</button>
  `;

  // Toggle
  div.querySelector('[data-action="toggle"]').onclick = () => {
    ch.enabled = !ch.enabled;
    renderAll(schedule);
  };

  // Pulse ms change
  div.querySelector('[data-field="pulse_ms"]').onchange = e => {
    ch.pulse_ms = Math.max(100, parseInt(e.target.value) || 2000);
  };

  // Add schedule / skip_date
  div.querySelectorAll('[data-add]').forEach(btn => {
    btn.onclick = () => {
      const list = btn.dataset.add;
      const inp = div.querySelector(`[data-input="${list}"]`);
      const val = inp.value.trim();
      if (!val) return;
      if (list === 'schedule') {
        if (!/^\d{2}:\d{2}$/.test(val)) { toast('Format: HH:MM', true); return; }
        const [h,m] = val.split(':').map(Number);
        if (h<0||h>23||m<0||m>59) { toast('Invalid time', true); return; }
      }
      if (list === 'skip_dates') {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) { toast('Format: YYYY-MM-DD', true); return; }
      }
      if (ch[list].includes(val)) { toast('Duplicate', true); return; }
      ch[list].push(val);
      if (list === 'schedule') ch[list].sort();
      else ch[list].sort().reverse();
      inp.value = '';
      renderAll(schedule);
    };
  });

  // Remove schedule / skip_date
  div.querySelectorAll('[data-remove]').forEach(btn => {
    btn.onclick = () => {
      const list = btn.dataset.remove;
      const val = btn.dataset.val;
      ch[list] = ch[list].filter(v => v !== val);
      renderAll(schedule);
    };
  });

  // Save
  div.querySelector('[data-action="save"]').onclick = async () => {
    try {
      await api('POST', '/api/schedule', schedule);
      toast(`${key.toUpperCase()} saved`);
    } catch (e) {
      toast('Save failed: ' + e.message, true);
    }
  };

  $('#channels').appendChild(div);
}

// ── Status poll ────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const s = await api('GET', '/api/status?_=' + Date.now());
    $('#srv-dot').className = 'dot on';
    $('#srv-uptime').textContent = fmtUptime(s.server_uptime);

    const hb = s.heartbeats || {};
    updateHB('hb-ch1', hb['ch1']);
    updateHB('hb-ch2', hb['ch2']);

    console.log('status', s);   // ← open browser DevTools (F12) to inspect
  } catch (e) {
    console.warn('status poll failed', e);
    $('#srv-dot').className = 'dot off';
    // Show waiting state for channels too
    updateHB('hb-ch1', undefined);
    updateHB('hb-ch2', undefined);
  }
}

function updateHB(id, sec) {
  const el = $('#' + id);
  if (sec === undefined || sec === null) {
    el.innerHTML = '<span class="dot off"></span> ' + id.slice(3).toUpperCase() + ' waiting';
    return;
  }
  const alive = sec < 120;
  el.innerHTML = '<span class="dot ' + (alive ? 'on' : 'off') + '"></span> ' + id.slice(3).toUpperCase() + ' ' + sec + 's ago';
}

function fmtUptime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h ? h + 'h ' + m + 'm' : m + 'm ' + Math.floor(s%60) + 's';
}

// ── Boot ───────────────────────────────────────────────────────────
(async () => {
  try {
    const data = await api('GET', '/api/schedule?_=' + Date.now());
    renderAll(data);
  } catch (e) {
    toast('Failed to load schedule', true);
  }
  pollStatus();
  setInterval(pollStatus, 5000);
})();
</script>
</body>
</html>
