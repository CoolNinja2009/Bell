<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Controller — Login</title>
<style>
  :root {
    --bg:       #080c12;
    --panel:    #11171f;
    --border:   #1c2736;
    --text:     #d4dce8;
    --dim:      #5e7088;
    --accent:   #00d4a0;
    --danger:   #e0556a;
    --radius:   12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 0%, #111d2e 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
  }
  h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 22px;
  }
  h1::before {
    content: "";
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 3px;
    box-shadow: 0 0 10px var(--accent);
  }
  label {
    display: block;
    font-size: 0.78rem;
    color: var(--dim);
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    background: #0c1119;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 0.95rem;
    margin-bottom: 18px;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #06110d;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .error {
    background: rgba(224, 85, 106, 0.12);
    border: 1px solid rgba(224, 85, 106, 0.35);
    color: var(--danger);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.82rem;
    margin-bottom: 18px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Relay Controller</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
