; PlatformIO Project Configuration File
; ─────────────────────────────────────
; Target:  ESP32 DevKit  (change `board` below for your board)
;
; Quick start:
;   pio run              — compile
;   pio run -t upload    — compile + flash
;   pio device monitor   — serial console

[env:esp32dev]
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv


; ── Library dependencies ─────────────────────────────────────────
lib_deps =
    bblanchon/ArduinoJson @ ^7
; ── Build flags (optional) ──────────────────────────────────────
; Uncomment below to enable Serial diagnostics at compile time:
; build_flags =
;     -D DEBUG_SERIAL

; ── Upload settings ─────────────────────────────────────────────
; upload_port  = COM3          ; force a specific port
; upload_speed = 921600        ; faster flash (default 460800)
